name: Deploy Genx Resturant (VPS via rsync + SSH)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      REMOTE_DOMAIN: ${{ secrets.GENX_DOMAIN || 'digierp.cloud' }}
      REMOTE_APP_DIR: ${{ secrets.GENX_REMOTE_APP_DIR || 'laravel' }}
      RUN_MIGRATIONS: ${{ secrets.GENX_RUN_MIGRATIONS || 'true' }}
      RUN_SEEDERS: ${{ secrets.GENX_RUN_SEEDERS || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SSH private key format
        run: |
          set -e
          echo "${{ secrets.GENX_SSH_KEY }}" > /tmp/genx_key
          chmod 600 /tmp/genx_key
          ssh-keygen -lf /tmp/genx_key

      - name: SSH preflight
        run: |
          ssh -i /tmp/genx_key \
              -p "${{ secrets.GENX_SSH_PORT }}" \
              -o StrictHostKeyChecking=no \
              -o IdentitiesOnly=yes \
              "${{ secrets.GENX_SSH_USER }}@${{ secrets.GENX_SSH_HOST }}" \
              "echo SSH OK: \$(whoami) on \$(hostname)"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend assets (Vue/Vite)
        run: |
          npm ci
          npm run build

      - name: Prepare deploy artifacts
        shell: bash
        run: |
          set -e
          rm -rf deploy_app deploy_public
          mkdir -p deploy_app deploy_public

          cp -r app bootstrap config database routes artisan composer.json composer.lock phpunit.xml .htaccess Modules deploy_app/ 2>/dev/null || true
          if [ -d lang ]; then cp -r lang deploy_app/; fi
          mkdir -p deploy_app/resources
          [ -d resources/lang ] && cp -r resources/lang deploy_app/resources/
          [ -d resources/views ] && cp -r resources/views deploy_app/resources/

          mkdir -p deploy_app/storage/app
          mkdir -p deploy_app/storage/framework/{cache,sessions,views}
          mkdir -p deploy_app/storage/logs
          mkdir -p deploy_app/bootstrap/cache
          touch deploy_app/storage/.gitignore

          rsync -a public/ deploy_public/
          mkdir -p deploy_app/public/build
          if [ -d public/build ]; then rsync -a public/build/ deploy_public/build/; fi
          if [ -d public/build ]; then rsync -a public/build/ deploy_app/public/build/; fi
          if [ -f public/.htaccess ]; then cp public/.htaccess deploy_public/.htaccess; fi

          cat > deploy_public/index.php <<'PHP'
          <?php

          use Illuminate\Contracts\Http\Kernel;
          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          if (file_exists($maintenance = __DIR__ . '/laravel/storage/framework/maintenance.php')) {
              require $maintenance;
          }

          define('LARAVEL_BASE', __DIR__ . '/laravel');

          require LARAVEL_BASE . '/vendor/autoload.php';
          $app = require LARAVEL_BASE . '/bootstrap/app.php';

          /** @var Kernel $kernel */
          $kernel = $app->make(Kernel::class);

          $response = tap($kernel->handle(
              $request = Request::capture()
          ))->send();

          $kernel->terminate($request, $response);
          PHP

      - name: Upload app via rsync (to /home/<domain>/public_html/<app_dir>)
        run: |
          rsync -avz \
            -e "ssh -i /tmp/genx_key -p ${{ secrets.GENX_SSH_PORT }} -o StrictHostKeyChecking=no -o IdentitiesOnly=yes" \
            deploy_app/ "${{ secrets.GENX_SSH_USER }}@${{ secrets.GENX_SSH_HOST }}:/home/${{ env.REMOTE_DOMAIN }}/public_html/${{ env.REMOTE_APP_DIR }}/"

      - name: Upload public via rsync (to /home/<domain>/public_html)
        run: |
          rsync -avz \
            -e "ssh -i /tmp/genx_key -p ${{ secrets.GENX_SSH_PORT }} -o StrictHostKeyChecking=no -o IdentitiesOnly=yes" \
            deploy_public/ "${{ secrets.GENX_SSH_USER }}@${{ secrets.GENX_SSH_HOST }}:/home/${{ env.REMOTE_DOMAIN }}/public_html/"

      - name: SSH - composer, permissions, artisan
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GENX_SSH_HOST }}
          port: ${{ secrets.GENX_SSH_PORT }}
          username: ${{ secrets.GENX_SSH_USER }}
          key: ${{ secrets.GENX_SSH_KEY }}
          envs: REMOTE_DOMAIN,REMOTE_APP_DIR,RUN_MIGRATIONS,RUN_SEEDERS
          script: |
            set -e
            cd "/home/$REMOTE_DOMAIN/public_html/$REMOTE_APP_DIR"

            cat > .env <<'EOF'
            APP_NAME=GenxRest
            APP_KEY=base64:++bfqLBhipz5bDL5cyjv4nzqswTjEJ9+4PnPu3GJxqI=
            APP_TIMEZONE=Asia/Colombo
            APP_ENV=codecanyon
            APP_DEBUG=false
            SESSION_DRIVER=file
            SESSION_DOMAIN=digierp.cloud
            SESSION_SECURE_COOKIE=true
            SESSION_SAME_SITE=lax
            SANCTUM_STATEFUL_DOMAINS=digierp.cloud
            MAIN_APPLICATION_SUBDOMAIN=
            REDIRECT_HTTPS=false
            DB_CONNECTION=mysql
            DB_PORT=3306
            DB_HOST=localhost
            DB_DATABASE=digi_digi_distribution
            DB_USERNAME=digi_digi_distribution
            DB_PASSWORD="wiJjL@K81LFfseLc"
            APP_URL=https://digierp.cloud/
            DEBUGBAR_ENABLED=false
            EOF
            chmod 600 .env || true

            mkdir -p storage/framework/{cache,sessions,views}
            mkdir -p bootstrap/cache

            WEB_GROUP="$(id -gn)"
            if getent group www-data >/dev/null 2>&1; then WEB_GROUP="www-data"; fi
            if getent group nginx >/dev/null 2>&1; then WEB_GROUP="nginx"; fi
            chown -R "$(whoami):$WEB_GROUP" storage bootstrap/cache public/user-uploads 2>/dev/null || true
            find storage bootstrap/cache -type d -exec chmod 775 {} \; 2>/dev/null || true
            find storage bootstrap/cache -type f -exec chmod 664 {} \; 2>/dev/null || true

            REQUIRED="mbstring intl bcmath curl dom fileinfo gd json openssl pdo pdo_mysql tokenizer xml sodium"
            MISSING=""
            for ext in $REQUIRED; do php -m | grep -qi "^$ext$" || MISSING="$MISSING $ext"; done
            if [ -n "$MISSING" ]; then
              echo "❌ Missing PHP extensions:$MISSING"
              exit 1
            fi

            if ! command -v composer >/dev/null 2>&1; then
              php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
              php composer-setup.php --install-dir=$HOME/bin --filename=composer
              rm composer-setup.php
              export PATH="$HOME/bin:$PATH"
            fi

            composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-progress

            php artisan optimize:clear || true
            # Avoid interactive module prompts in non-interactive CI shell.
            # Run module publish manually only when needed.

            if [ "$RUN_MIGRATIONS" = "true" ]; then
              php artisan migrate --force
            fi
            if [ "$RUN_SEEDERS" = "true" ]; then
              php artisan db:seed --force
            fi

            php artisan storage:link || true

            cd "/home/$REMOTE_DOMAIN/public_html"
            rm -rf user-uploads 2>/dev/null || true
            ln -sf "./$REMOTE_APP_DIR/public/user-uploads" user-uploads
            ls -la user-uploads
